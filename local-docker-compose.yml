services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: beatcell-white:local
    container_name: beatcell-white
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: 8009
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8009/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
